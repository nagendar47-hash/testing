apiVersion: apps/v1
kind: Deployment
metadata:
  name: alpine-app
  namespace: default
  labels:
    app: alpine-app
spec:
  replicas: 6
  selector:
    matchLabels:
      app: alpine-app
  template:
    metadata:
      labels:
        app: alpine-app
    spec:
      containers:
      - name: alpine-app
        image: alpine:3.19
        command: ["/bin/sh", "-c"]
        args: ["while true; do echo 'App running...'; sleep 30; done"]
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: alpine-app-svc
  namespace: default
spec:
  selector:
    app: alpine-app
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP
