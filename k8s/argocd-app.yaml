apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alpine-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nagendar47-hash/testing.git
    targetRevision: HEAD
    path: k8s          # folder where deployment.yaml lives
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
